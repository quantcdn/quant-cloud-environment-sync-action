name: Test Environment Sync

on:
  workflow_dispatch:
    inputs:
      environment_name:
        description: 'The name of the environment to sync to'
        required: true
        default: 'staging'
      source:
        description: 'The name of the source environment'
        required: true
        default: 'production'
      type:
        description: 'The type of data to sync'
        required: true
        default: 'filesystem'
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  unit-test:
    name: Run unit tests
    runs-on: ubuntu-latest
    services:
      mock-api:
        image: ghcr.io/quantcdn/quant-mock-api:4.0.0
        ports:
          - 4010:4010
        options: >-
          --health-cmd "nc -z 127.0.0.1 4010"
          --health-interval 10s
          --health-timeout 5s
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: npm install
      - name: Run unit tests
        run: npm test
      - name: Build
        run: npm run build
      - name: Test action
        run: npm run test
  test-action:
    name: Test the action with a mock API
    services:
      mock-api:
        image: ghcr.io/quantcdn/quant-mock-api:4.0.0
        ports:
          - 4010:4010
        options: >-
          --health-cmd "nc -z 127.0.0.1 4010"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Sync environment data
        uses: ./
        id: sync-environment
        with:
          api_key: ${{ secrets.QUANT_API_KEY }}
          environment_name: ${{ inputs.environment_name || 'staging' }}
          source: ${{ inputs.source || 'production' }}
          app_name: 'actions'
          organization: ${{ secrets.QUANT_ORGANIZATION }}
          type: ${{ inputs.type || 'filesystem' }}
          base_url: http://localhost:4010
      - name: Debug Outputs
        run: |
          echo "Sync Success: ${{ steps.sync-environment.outputs.success }}"